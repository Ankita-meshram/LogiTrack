<!DOCTYPE html>
<html>
<head>
    <title>Book Parcel</title>
</head>
<body>

<h2>Book a Parcel</h2>

<form action="/save_parcel" method="POST">

    <label>Sender Name</label><br>
    <input type="text" name="sender" required><br><br>

    <label>Receiver Name</label><br>
    <input type="text" name="receiver" required><br><br>

    <label>Phone Number</label><br>
    <input type="text" name="phone" required><br><br>

    <label>Address</label><br>
    <textarea name="address" required></textarea><br><br>

    <label>Pincode</label><br>
    <input type="text" name="pincode" required><br><br>

    <button type="submit">Book Parcel</button>

</form>

</body>
</html>
